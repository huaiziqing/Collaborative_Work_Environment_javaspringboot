spring:
  datasource:
    url: jdbc:mysql://120.26.114.28:3306/library_rental_system?useSSL=false&serverTimezone=UTC
    username: connect
    password: tute@alydmysql
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Redis 以及 缓存 的配置
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: true
      use-key-prefix: true
      key-prefix: "CACHE_"

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: org.example.**.model
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

server:
  port: 8080

logging:
  level:
    org.example: DEBUG
    org.mybatis: DEBUG